services:
  - type: web
    name: smarterp-api
    runtime: python
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn smarterp.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: DATABASE_URL
        value: file:./smarterp.db
      - key: JWT_SECRET
        generateValue: true
      - key: DEBUG
        value: false
      - key: DJANGO_SETTINGS_MODULE
        value: smarterp.settings
